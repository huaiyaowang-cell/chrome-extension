<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>下载 Poki 游戏</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 800px;
        max-width: 95vw;
        padding: 14px;
        color: #111827;
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .top-bar h1 {
        margin: 0;
        font-size: 15px;
        flex: 1;
      }

      .clear-config-btn {
        width: auto;
        padding: 6px 12px;
        font-size: 12px;
        flex-shrink: 0;
        background: #fef2f2;
        color: #b91c1c;
      }

      .clear-config-btn:hover {
        background: #fee2e2;
      }

      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }

      p {
        margin: 0 0 12px;
        font-size: 12px;
        color: #4b5563;
        line-height: 1.45;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: #2563eb;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }

      button:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }

      .secondary {
        margin-top: 8px;
        background: #e5e7eb;
        color: #111827;
      }

      .status {
        margin-top: 10px;
        min-height: 18px;
        font-size: 12px;
        color: #1f2937;
        white-space: pre-wrap;
      }

      .status.error {
        color: #dc2626;
      }

      .hint {
        margin-top: 10px;
        font-size: 11px;
        color: #6b7280;
      }

      .config-section {
        margin-top: 12px;
        border-top: 1px solid #e5e7eb;
        padding-top: 10px;
      }

      .config-section h2 {
        font-size: 13px;
        margin: 0 0 4px;
        color: #374151;
      }

      .config-desc {
        font-size: 11px;
        color: #6b7280;
        margin: 0 0 6px;
        line-height: 1.35;
      }

      .full-width {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 5px;
        padding: 6px 8px;
        font-size: 11px;
        outline: none;
      }

      .full-width:focus {
        border-color: #2563eb;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        margin: 8px 0;
        cursor: pointer;
      }

      .field-label {
        display: block;
        font-size: 11px;
        color: #6b7280;
        margin: 8px 0 4px;
      }

      .sink-test-btn {
        margin-top: 8px;
      }

      .sink-fixed-info code {
        word-break: break-all;
        font-size: 10px;
      }

      .missing-section {
        margin-top: 12px;
        border-top: 1px solid #e5e7eb;
        padding-top: 10px;
      }

      .missing-section h2 {
        font-size: 13px;
        margin: 0 0 6px;
        color: #374151;
      }

      .missing-summary {
        font-size: 11px;
        color: #6b7280;
        margin: 0 0 8px;
        line-height: 1.4;
      }

      .missing-games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
        gap: 10px;
        max-height: 220px;
        overflow-y: auto;
        padding: 4px 2px;
      }

      .missing-game-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px 4px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        cursor: pointer;
        color: inherit;
        font: inherit;
        width: 100%;
        transition: background 0.15s, border-color 0.15s;
      }

      .missing-game-card:hover {
        background: #eff6ff;
        border-color: #93c5fd;
      }

      .missing-game-card img {
        width: 56px;
        height: 56px;
        border-radius: 10px;
        object-fit: cover;
        background: #e5e7eb;
      }

      .missing-game-card span {
        font-size: 10px;
        line-height: 1.2;
        text-align: center;
        color: #374151;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .missing-empty {
        font-size: 12px;
        color: #059669;
        padding: 8px 0;
      }

      .sink-fixed-info code {
        word-break: break-all;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <h1>Poki 游戏下载器</h1>
      <button type="button" id="clearConfigBtn" class="secondary clear-config-btn">清空配置</button>
    </div>
    <p>先开启监听，再刷新页面进入游戏。<br/>检测到游戏后资源自动下载；游戏 HTML 缓存就绪后会自动生成 index.html（已存在则跳过）。</p>

    <div class="config-section">
      <h2>本地写盘服务</h2>
      <p class="config-desc">先运行 <code>npm run poki-server</code>。两个扩展共用下方配置；游戏按名称落在输出目录下。已存在文件会跳过。</p>
      <label class="checkbox-row">
        <input type="checkbox" id="useLocalSink" checked />
        使用本地服务写盘（推荐）
      </label>
      <label class="field-label" for="sinkServerUrl">服务地址</label>
      <input type="text" id="sinkServerUrl" class="full-width" value="http://127.0.0.1:22222" />
      <label class="field-label" for="sinkOutputRoot">输出根目录（绝对路径）</label>
      <input type="text" id="sinkOutputRoot" class="full-width" placeholder="/Users/you/work/chrome-extension" />
      <button type="button" id="testSinkBtn" class="secondary" style="margin-top:8px">检测本地服务</button>
    </div>

    <div class="missing-section">
      <h2>推荐区未下载游戏</h2>
      <p class="missing-summary">在当前 Poki 游戏页解析推荐列表，对比输出目录中尚未抓取的游戏。</p>
      <button type="button" id="scanMissingBtn" class="secondary">检查未下载游戏</button>
      <p id="missingSummary" class="missing-summary" style="display: none"></p>
      <div id="missingGamesGrid" class="missing-games-grid" style="display: none"></div>
      <p id="missingEmpty" class="missing-empty" style="display: none">推荐区游戏均已存在于输出目录。</p>
    </div>

    <button id="startBtn">开始监听当前标签页</button>
    <button id="captureBtn" class="secondary" disabled>重新生成 HTML</button>
    <button id="stopBtn" class="secondary" disabled>停止监听并写入清单</button>
    <div id="status" class="status"></div>

    <p class="hint">本地服务：{输出根目录}/&lt;game-name&gt;/</p>
    <script src="popup.js"></script>
  </body>
</html>

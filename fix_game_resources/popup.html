<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>补全 404 资源</title>
    <style>
      * { box-sizing: border-box; }
      html {
        width: 1100px;
        min-width: 1100px;
        min-height: 820px;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 1100px;
        min-width: 1100px;
        min-height: 820px;
        max-width: 98vw;
        max-height: 96vh;
        overflow-y: auto;
        padding: 18px 20px;
        color: #111827;
        font-size: 13px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
        color: #111827;
      }
      .form-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .form-row label {
        flex: 0 0 100px;
        color: #4b5563;
        font-size: 12px;
      }
      .form-row input {
        flex: 1;
        min-width: 0;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
      }
      .form-row input:focus {
        outline: none;
        border-color: #10b981;
      }
      .form-row input::placeholder {
        color: #9ca3af;
      }
      .section {
        margin-top: 12px;
        border-top: 1px solid #e5e7eb;
        padding-top: 10px;
      }
      .section-title {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        margin: 0 0 8px;
      }
      .hint {
        font-size: 10px;
        color: #6b7280;
        margin-top: 4px;
      }
      button {
        border: 0;
        border-radius: 6px;
        padding: 9px 14px;
        font-size: 13px;
        cursor: pointer;
        background: #10b981;
        color: #fff;
      }
      button:hover { background: #059669; }
      button:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }
      button.secondary {
        background: #e5e7eb;
        color: #374151;
      }
      button.secondary:hover { background: #d1d5db; }
      .btn-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .list-box {
        max-height: 320px;
        overflow-y: auto;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 8px;
        background: #f9fafb;
        font-size: 12px;
      }
      .list-item {
        padding: 4px 6px;
        border-bottom: 1px solid #f3f4f6;
        word-break: break-all;
      }
      .list-item:last-child { border-bottom: 0; }
      .list-item .path { color: #059669; }
      .list-item .url { color: #6b7280; font-size: 10px; }
      .empty-list { color: #9ca3af; padding: 8px; }
      .failed-list .list-item .url { color: #dc2626; }
      .failed-list .list-item .error { color: #b91c1c; font-size: 10px; }
      .status-msg {
        margin-top: 8px;
        padding: 6px 8px;
        border-radius: 6px;
        font-size: 11px;
      }
      .status-msg.info { background: #dbeafe; color: #1e40af; }
      .status-msg.error { background: #fee2e2; color: #b91c1c; }
      .status-msg.ok { background: #d1fae5; color: #065f46; }
      .top-hint { margin: 0 0 10px; line-height: 1.4; }
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0;
        cursor: pointer;
      }
      .sink-section { margin-top: 0; border-top: 0; padding-top: 0; }
      .sink-fixed-info code {
        word-break: break-all;
        font-size: 10px;
      }

      .local-games-summary {
        font-size: 11px;
        color: #6b7280;
        margin: 0 0 8px;
        line-height: 1.4;
      }

      .local-games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
        gap: 12px;
        max-height: 420px;
        overflow-y: auto;
        padding: 6px 4px;
      }

      .local-game-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px 4px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        cursor: pointer;
        color: inherit;
        font: inherit;
        width: 100%;
        transition: background 0.15s, border-color 0.15s;
      }

      .local-game-card:hover {
        background: #ecfdf5;
        border-color: #6ee7b7;
      }

      .local-game-card img {
        width: 68px;
        height: 68px;
        border-radius: 10px;
        object-fit: cover;
        background: #e5e7eb;
      }

      .local-game-card span {
        font-size: 11px;
        line-height: 1.2;
        text-align: center;
        color: #374151;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .local-games-empty {
        font-size: 12px;
        color: #6b7280;
        padding: 8px 0;
      }
    </style>
  </head>
  <body>
    <h1>补全 404 资源</h1>
    <p class="hint top-hint">与 download-poki-game 共用本地服务。落盘：<code>{输出根}/&lt;游戏名&gt;/</code></p>

    <div class="section sink-section">
      <div class="section-title">本地写盘</div>
      <label class="checkbox-row">
        <input type="checkbox" id="useLocalSink" checked />
        使用本地服务（npm run poki-server）
      </label>
      <div class="form-row">
        <label>服务地址</label>
        <input type="text" id="sinkServerUrl" value="http://127.0.0.1:22222" />
      </div>
      <div class="form-row">
        <label>输出根目录</label>
        <input type="text" id="sinkOutputRoot" placeholder="/Users/you/work/chrome-extension" />
      </div>
      <div class="btn-row">
        <button type="button" class="secondary" id="testSinkBtn">检测服务</button>
        <button type="button" class="secondary" id="importManifestBtn">读 manifest</button>
      </div>
    </div>

    <div class="section" id="localGamesSection">
      <div class="section-title">本地游戏库</div>
      <p class="hint">扫描输出根目录下的游戏文件夹，显示头像；点击在当前标签页打开（使用当前预览服务的端口，如 localhost:8090）。</p>
      <div class="btn-row">
        <button type="button" class="secondary" id="loadLocalGamesBtn">读取本地游戏</button>
      </div>
      <p id="localGamesSummary" class="local-games-summary" style="display: none"></p>
      <div id="localGamesGrid" class="local-games-grid" style="display: none"></div>
      <div id="localGamesEmpty" class="local-games-empty">填写输出根目录后点击「读取本地游戏」。</div>
    </div>

    <div class="form-row">
      <label>游戏 CDN 根地址</label>
      <input type="text" id="domain" placeholder="minigame 或 Poki 完整地址均可" />
    </div>
    <div class="form-row">
      <label>游戏名（可选）</label>
      <input type="text" id="gameName" placeholder="从当前页 URL 解析" />
    </div>
    <p class="hint">开始监听后，会根据当前页 URL 自动读取同目录 <code>assets-manifest.json</code> 的 <code>gameUrl</code>（去掉参数）与游戏名；切换游戏页时自动更新。</p>
    <div class="btn-row">
      <button type="button" id="saveSettings">保存设置</button>
      <button type="button" id="toggleListen">开始监听</button>
    </div>

    <div class="section">
      <div class="section-title">404 资源（同源请求）</div>
      <div id="list404" class="list-box">
        <div class="empty-list">点击「开始监听」后，在游戏页刷新或操作，监听到的 404 会列在下方并自动下载补全。</div>
      </div>
      <div class="btn-row" style="margin-top: 8px;">
        <button type="button" class="secondary" id="clear404">清空 404 列表</button>
      </div>
    </div>

    <div class="section" id="failedSection" style="display: none;">
      <div class="section-title">下载失败的资源</div>
      <div id="failedList" class="list-box failed-list"></div>
    </div>

    <div id="status" class="status-msg" style="display: none;"></div>
    <script src="popup.js"></script>
  </body>
</html>
